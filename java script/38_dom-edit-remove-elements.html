<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: black; color: aliceblue;">
    <ul class="language">
        <li>JAVASCRIPT</li>
    </ul>
</body>
<script>
    function addLang(langName) {
        const li = document.createElement('li');
        li.innerHTML = `${langName}`;
        document.querySelector('.language').appendChild(li);
    }
    addLang("PYTHON");
    addLang("REACT");


    function addOptiLang(langName) {
        const li = document.createElement('li');
        const addText = document.createTextNode(langName);
        li.appendChild(addText);
        document.querySelector('.language').appendChild(li);
    }
    addLang("RUST");
    addLang("C");


    /* EDIT  */

    const firstLang = document.querySelector("li:nth-child(2)");
    // firstLang.innerHTML = "MOJO";
    const newLi = document.createElement('li');
    newLi.textContent = "MOJO";
    firstLang.replaceWith(newLi);

    const secondLang = document.querySelector("li:first-child");
    secondLang.outerHTML = '<li>JAVA</li>';


    /* REMOVE */ 

    const lastLang = document.querySelector('li:last-child');
    lastLang.remove();
</script>
</html>

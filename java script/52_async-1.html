<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYNC</title>
</head>
<body>
    <h1>CHAI AUR CODE</h1>
    <button id="stop">STOP</button>
</body>
<script>
    const sayAyan =  () => {
        console.log("Ayan");
    }

    const changeText = () => {
        document.querySelector('h1').innerHTML = "AYAN";
    }

    const changeMe = setTimeout(changeText, 2000);

    document.querySelector('#stop').addEventListener('click', () => {
        clearTimeout(changeMe);
        console.log("STOPPED");
        
    })
</script>
</html>
